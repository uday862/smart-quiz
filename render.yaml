services:
  - type: web
    name: smart-quiz-platform
    env: node
    plan: free
    # Enhanced build command for subdirectory projects
    buildCommand: "npm install --prefix frontend && npm run build --prefix frontend && npm install --prefix backend"
    startCommand: "cd backend && node server.js"

    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5001
