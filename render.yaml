services:
  - type: web
    name: smart-quiz-platform
    env: node
    plan: free
    # Simplified deployment using root package.json
    buildCommand: "npm run build"
    startCommand: "npm start"


    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5001
